name: iOS Build

on:
  pull_request:
    branches-ignore:
      - l10n_main
  push:
    branches-ignore:
      - l10n_main
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14
    env:
      PLATFORM: 2
      PLATFORM_NAME: ios
      SLIMMED: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: zulu
          architecture: aarch64

      - name: Install toolchain dependencies
        run: |
          for formula in make ldid wget; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              brew install "$formula"
            fi
          done
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Restore external dependencies
        run: bash scripts/ci/restore_external_dependencies.sh

      - name: Print build environment
        run: |
          export PATH=/opt/homebrew/bin:$PATH
          xcodebuild -version
          cmake --version
          java -version
          git submodule status --recursive

      - name: Build iOS artifacts
        run: |
          export PATH=/opt/homebrew/bin:$PATH
          export BOOTJDK="$JAVA_HOME/bin"
          gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM="$PLATFORM"
          gmake -j"$(sysctl -n hw.ncpu)" dsym package PLATFORM="$PLATFORM" TROLLSTORE_JIT_ENT=1

      - name: Upload regular ipa
        uses: actions/upload-artifact@v6
        with:
          name: org.angelauramc.amethyst-${{ env.PLATFORM_NAME }}.ipa
          path: artifacts/org.angelauramc.amethyst-*-${{ env.PLATFORM_NAME }}.ipa
          if-no-files-found: error

      - name: Upload regular tipa
        uses: actions/upload-artifact@v6
        with:
          name: org.angelauramc.amethyst-${{ env.PLATFORM_NAME }}-trollstore.tipa
          path: artifacts/org.angelauramc.amethyst-*-${{ env.PLATFORM_NAME }}-trollstore.tipa
          if-no-files-found: error

      - name: Upload slimmed ipa
        uses: actions/upload-artifact@v6
        with:
          name: org.angelauramc.amethyst.slimmed-${{ env.PLATFORM_NAME }}.ipa
          path: artifacts/org.angelauramc.amethyst.slimmed-*-${{ env.PLATFORM_NAME }}.ipa
          if-no-files-found: error

      - name: Upload slimmed tipa
        uses: actions/upload-artifact@v6
        with:
          name: org.angelauramc.amethyst.slimmed-${{ env.PLATFORM_NAME }}-trollstore.tipa
          path: artifacts/org.angelauramc.amethyst.slimmed-*-${{ env.PLATFORM_NAME }}-trollstore.tipa
          if-no-files-found: error

      - name: Upload dSYM
        uses: actions/upload-artifact@v6
        with:
          name: AngelAuraAmethyst.dSYM
          path: artifacts/AngelAuraAmethyst.dSYM
          if-no-files-found: error
